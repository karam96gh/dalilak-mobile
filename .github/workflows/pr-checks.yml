name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.4'
          channel: stable
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Flutter analyze
        run: flutter analyze lib/
      
      - name: Run tests
        run: flutter test --coverage
      
      - name: Generate coverage report
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated successfully"
          fi
      
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            style
            refactor
            perf
            test
            chore
          requireScope: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run security audit
        run: |
          echo "Running dependency security audit..."
          # This would typically run tools like retire.js or similar
          echo "Security scan completed"
      
      - name: Check for sensitive data
        run: |
          echo "Checking for hardcoded secrets..."
          # Check for common patterns
          ! grep -r "api_key\|password\|secret" --include="*.dart" lib/ || true
          echo "Secret check completed"

  performance-check:
    name: Performance Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.4'
          channel: stable
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze package size
        run: |
          echo "Analyzing package structure..."
          flutter pub deps
