name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.4'
          channel: stable
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build APK (debug)
        run: flutter build apk --flavor development
      
      - name: Build APK (release)
        run: flutter build apk --flavor production --release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-android-apk
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.4'
          channel: stable
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download Android artifact
        uses: actions/download-artifact@v3
        with:
          name: app-android-apk
      
      - name: Download iOS artifact
        uses: actions/download-artifact@v3
        with:
          name: app-ios-build
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Dalilak v${{ github.ref_name }}
            
            ### Changes
            - See commits for details
            
            ### Downloads
            - Android APK: app-release.apk
          draft: false
          prerelease: false
      
      - name: Upload Release Asset (APK)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app-release.apk
          asset_name: dalilak-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
