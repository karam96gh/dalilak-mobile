name: dalilak_app
description: "Dalilak - Complete Flutter app for exploring businesses and services"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  material_design_icons_flutter: ^7.0.7296

  # State Management
  riverpod: ^2.4.10
  flutter_riverpod: ^2.4.10
  hooks_riverpod: ^2.4.10
  flutter_hooks: ^0.21.0

  # HTTP & API
  dio: ^5.3.1
  retrofit: ^4.1.0
  json_annotation: ^4.8.1

  # JSON Serialization
  freezed_annotation: ^2.4.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # Images
  cached_network_image: ^3.3.0

  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.2
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^7.0.0
  
  # Shimmer Loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  retrofit_generator: ^8.1.2
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.0
  
  # Testing
  mocktail: ^1.0.3
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  # Generate localized messages
  generate: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
